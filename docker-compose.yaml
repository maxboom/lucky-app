version: '3.9'

services:
  app:
    image: php:8.2-cli
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: lucky_app
      DB_USER: lucky
      DB_PASS: lucky
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "docker-php-ext-install pdo pdo_mysql &&
             php -S 0.0.0.0:8000 -t src/UI/public src/UI/public/index.php"

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lucky_app
      MYSQL_USER: lucky
      MYSQL_PASSWORD: lucky
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "lucky", "-plucky"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
